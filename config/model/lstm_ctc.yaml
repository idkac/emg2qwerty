# @package _global_
module:
  _target_: emg2qwerty.lightning.RecurrentCTCModule
  in_features: ${spectrogram_in_features:${logspec.n_fft},16}  # Channel masking keeps shape fixed
  mlp_features: [384]
  rnn_type: lstm
  hidden_size: 256
  num_layers: 2
  bidirectional: true
  dropout: 0.2

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
